<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản - AutoCar</title>
    <link rel="stylesheet" href="dangnhap.css" />
    <link rel="stylesheet" href="dangki.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <a href="index.html" class="logo">AUTOCAR</a>
          <h2>Tạo tài khoản mới</h2>
          <p>Gia nhập cộng đồng yêu xe ngay hôm nay</p>
        </div>

        <form action="#">
          <div class="input-group">
            <label for="fullname">Họ và Tên</label>
            <input
              type="text"
              id="fullname"
              placeholder="Nguyễn Văn A"
              required
            />
          </div>

          <div class="input-group">
            <label for="phone">Số điện thoại</label>
            <input type="tel" id="phone" placeholder="090xxxxxxx" required />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="example@gmail.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Tối thiểu 8 ký tự"
              required
            />
          </div>

          <div class="input-group">
            <label for="re-password">Xác nhận mật khẩu</label>
            <input
              type="password"
              id="re-password"
              placeholder="Nhập lại mật khẩu"
              required
            />
          </div>

          <div class="options">
            <label style="display: flex; gap: 8px; align-items: flex-start">
              <input type="checkbox" style="margin-top: 4px" required />
              Tôi đồng ý với các Điều khoản & Chính sách của AutoWorld
            </label>
          </div>

          <button type="submit" class="btn-submit">ĐĂNG KÝ NGAY</button>
        </form>

        <div class="login-footer">
          <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
