<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - AutoWorld</title>
    <link rel="stylesheet" href="dangnhap.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <a href="index.html" class="logo">AUTOCAR</a>
          <h2>Chào mừng trở lại!</h2>
          <p>Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <form action="#">
          <div class="input-group">
            <label for="email">Email hoặc Số điện thoại</label>
            <input
              type="text"
              id="email"
              placeholder="Nhập email của bạn"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>

          <div class="options">
            <label><input type="checkbox" /> Ghi nhớ đăng nhập</label>
            <a href="#" class="forgot-pass">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
        </form>

        <div class="login-footer">
          <p>Chưa có tài khoản? <a href="dangki.html">Đăng ký ngay</a></p>
          <div class="divider"><span>Hoặc đăng nhập bằng</span></div>
          <div class="social-login">
            <a href="#" class="social-btn fb"
              ><i class="fab fa-facebook-f"></i> Facebook</a
            >
            <a href="#" class="social-btn gg"
              ><i class="fab fa-google"></i> Google</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
